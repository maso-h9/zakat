name: zakat_app
description: تطبيق الزكاة - دليلك الشامل لأداء الزكاة
version: 1.4.0+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Dependency Injection
  get_it: ^8.0.2

  # Local Storage
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0

  # Networking
  http: ^1.1.0

  # Serialization
  json_annotation: ^4.9.0

  # UI
  fl_chart: ^0.66.2
  google_fonts: ^6.2.1
  intl: ^0.20.2
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  url_launcher: ^6.3.0

  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4
  home_widget: ^0.9.3

  # Auth
  google_sign_in: ^6.2.1

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_crashlytics: ^4.3.10
  firebase_messaging: ^15.1.0
  firebase_remote_config: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  mocktail: ^1.0.4
  json_serializable: ^6.8.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: Scheherazade
      fonts:
        - asset: assets/fonts/ScheherazadeNew-Regular.ttf
        - asset: assets/fonts/ScheherazadeNew-Bold.ttf
          weight: 700
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"          