name: zakat_app
description: تطبيق الزكاة - دليلك الشامل لأداء الزكاة
version: 1.4.0+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  provider: ^6.1.1
  shared_preferences: ^2.2.2
  http: ^1.1.0
  fl_chart: ^0.66.2
  google_fonts: ^6.2.1
  intl: ^0.20.2
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4
  home_widget: ^0.9.3

  # تسجيل الدخول بـ Google
  google_sign_in: ^6.2.1

  # Firebase — أَلغِ التعليق بعد: flutterfire configure
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: Scheherazade
      fonts:
        - asset: assets/fonts/ScheherazadeNew-Regular.ttf
        - asset: assets/fonts/ScheherazadeNew-Bold.ttf
          weight: 700
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"          