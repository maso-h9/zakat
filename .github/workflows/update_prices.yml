name: Update Gold/Silver Prices

on:
  schedule:
    # كل 6 ساعات — UTC time
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch: {}   # يسمح بتشغيل يدوي من تبويب Actions

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install firebase-admin
        working-directory: scripts

      - name: Run price update script
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOLDAPI_KEY: ${{ secrets.GOLDAPI_KEY }}
          METALS_API_KEY: ${{ secrets.METALS_API_KEY }}
        run: node update_prices.js  
         # لان